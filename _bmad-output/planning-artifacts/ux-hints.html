<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ch3ss — Ocean vs Ocean accessible</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #F8F6F1; color: #3D3A36; }
  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; }
  .sub { font-size: 13px; color: #8A8078; text-align: center; margin: 4px 0 24px; }
  .compare { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
  .col { flex: 1; min-width: 300px; max-width: 420px; }
  .col h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; text-align: center; }
  .col .tag { font-size: 11px; color: #8A8078; text-align: center; margin-bottom: 12px; }

  .board-container { position: relative; width: 100%; margin: 0 auto; }
  .board { display: grid; grid-template-columns: repeat(8, 1fr); aspect-ratio: 1;
    border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .sq { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .sq-l { background: #E8F0E8; }
  .sq-d { background: #B8D0B4; }
  .pc { width: 88%; height: 88%; object-fit: contain; pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18)) brightness(1.1);
    position: relative; z-index: 2; }

  .arrow-svg { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .arrow-svg .arrow-hit { pointer-events: auto; cursor: pointer; }
  .sq.click { cursor: pointer; }

  @keyframes pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  .anim { animation: pop 0.3s ease-out; }
  @keyframes fadeout { to { opacity: 0; } }

  .undo-bar { text-align: center; height: 36px; margin-top: 8px; }
  .undo { font-family: 'Poppins', sans-serif; background: rgba(0,0,0,0.06); color: #8A8078;
    font-size: 13px; padding: 6px 20px; border: none; border-radius: 6px; cursor: pointer;
    opacity: 0; transition: opacity 0.3s; }

  .opt-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .c2-btn { display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    border: 2px solid #E8DCC8; border-radius: 8px; cursor: pointer; background: #fff;
    font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 500; color: #3D3A36; transition: all 0.15s; }
  .c2-btn:hover { border-color: #B0A89E; }
  .c2-btn.on { border-color: #3D3A36; }
  .c2-dot { width: 18px; height: 18px; border-radius: 50%; }
</style>
</head>
<body>
<div class="main">
  <h1>Couleur 2 — Alternatives accessibles</h1>
  <p class="sub">Bleu #3A70B0 + Violet #8D5AA5 fixes. Clique pour comparer la couleur 2.</p>

  <div class="compare">
    <div class="col">
      <h2 id="label-a">Ambre dore</h2>
      <p class="tag" id="tag-a"></p>
      <div class="board-container">
        <div class="board" id="board-a"></div>
        <svg class="arrow-svg" id="svg-a" viewBox="0 0 800 800"></svg>
      </div>
      <div class="undo-bar"><button class="undo" id="undo-a">Annuler</button></div>
    </div>

    <div class="col">
      <h2 id="label-b">Corail</h2>
      <p class="tag" id="tag-b"></p>
      <div class="board-container">
        <div class="board" id="board-b"></div>
        <svg class="arrow-svg" id="svg-b" viewBox="0 0 800 800"></svg>
      </div>
      <div class="undo-bar"><button class="undo" id="undo-b">Annuler</button></div>
    </div>
  </div>

  <div style="margin-top:24px;">
    <h2 style="font-size:14px; font-weight:600; margin-bottom:10px; text-align:center;">Choisir la couleur 2</h2>
    <div class="opt-row" style="justify-content:center;" id="color2-opts"></div>
  </div>
</div>

<script>
const BASE = 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/staunty';

const pos = [
  ['bR','','bB','bQ','bK','bB','','bR'],
  ['bP','bP','bP','','','bP','bP','bP'],
  ['','','bN','','','bN','',''],
  ['','','','bP','bP','','',''],
  ['','','','wP','wP','','',''],
  ['','','wN','','','wN','',''],
  ['wP','wP','wP','','','wP','wP','wP'],
  ['wR','','wB','wQ','wK','wB','','wR'],
];

const moves = [
  { sr:5,sc:2, dr:3,dd:3 },
  { sr:7,sc:3, dr:5,dd:3 },
  { sr:5,sc:5, dr:4,dd:7 },
];

const BLUE = '#3A70B0';
const PURPLE = '#8D5AA5';

const COLOR2_OPTIONS = [
  { id:'ambre',    label:'Ambre dore',    hex:'#B8860B' },
  { id:'corail',   label:'Corail',        hex:'#C0564B' },
  { id:'rouille',  label:'Rouille',       hex:'#A85820' },
  { id:'brique',   label:'Brique rose',   hex:'#B5545E' },
  { id:'cannelle', label:'Cannelle',      hex:'#9E6B3A' },
  { id:'grenat',   label:'Grenat',        hex:'#A04060' },
];

let pickA = 0;
let pickB = 1;

function getColors(optIdx) {
  return [BLUE, COLOR2_OPTIONS[optIdx].hex, PURPLE];
}

function buildSquares(boardEl) {
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r+c)%2===0?'sq-l':'sq-d');
      sq.dataset.r = r; sq.dataset.c = c;
      if (pos[r][c]) {
        const img = document.createElement('img');
        img.className = 'pc';
        img.src = `${BASE}/${pos[r][c]}.svg`;
        img.draggable = false;
        sq.appendChild(img);
      }
      boardEl.appendChild(sq);
    }
  }
}

function isKnightMove(m) {
  const dr = Math.abs(m.dr - m.sr), dc = Math.abs(m.dd - m.sc);
  return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
}

function buildArrow(m) {
  const SZ = 100;
  const cx1 = m.sc * SZ + SZ/2, cy1 = m.sr * SZ + SZ/2;
  const cx2 = m.dd * SZ + SZ/2, cy2 = m.dr * SZ + SZ/2;
  const HEAD_LEN = 40;

  if (!isKnightMove(m)) {
    const dx = cx2-cx1, dy = cy2-cy1;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const sx = cx1 + ux*44, sy = cy1 + uy*44;
    const hx = cx2 - ux*HEAD_LEN, hy = cy2 - uy*HEAD_LEN;
    const tx = cx2 - ux*8, ty = cy2 - uy*8;
    return { shaft: `M${sx},${sy} L${hx},${hy}`, headBase:{x:hx,y:hy}, headTip:{x:tx,y:ty}, dir:{x:ux,y:uy} };
  }

  const dr = Math.abs(m.dr - m.sr), dc = Math.abs(m.dd - m.sc);
  const R = 28;

  if (dr > dc) {
    const mx = cx1, my = cy2;
    const dirV = cy2 > cy1 ? 1 : -1, dirH = cx2 > cx1 ? 1 : -1;
    const sy = cy1 + 44 * dirV;
    const cornerY = my - R * dirV, cornerX = mx + R * dirH;
    const hx = cx2 - HEAD_LEN * dirH, tx = cx2 - 8 * dirH;
    return { shaft: `M${mx},${sy} L${mx},${cornerY} Q${mx},${my} ${cornerX},${my} L${hx},${my}`, headBase:{x:hx,y:my}, headTip:{x:tx,y:my}, dir:{x:dirH,y:0} };
  } else {
    const mx = cx2, my = cy1;
    const dirH = cx2 > cx1 ? 1 : -1, dirV = cy2 > cy1 ? 1 : -1;
    const sx = cx1 + 44 * dirH;
    const cornerX = mx - R * dirH, cornerY = my + R * dirV;
    const hy = cy2 - HEAD_LEN * dirV, ty = cy2 - 8 * dirV;
    return { shaft: `M${sx},${my} L${cornerX},${my} Q${mx},${my} ${mx},${cornerY} L${mx},${hy}`, headBase:{x:mx,y:hy}, headTip:{x:mx,y:ty}, dir:{x:0,y:dirV} };
  }
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)].join(',');
}

function renderBoard(boardId, svgId, undoId, colors) {
  const board = document.getElementById(boardId);
  const svg = document.getElementById(svgId);
  buildSquares(board);
  svg.innerHTML = '';

  const NS = 'http://www.w3.org/2000/svg';
  const STROKE = 22;
  const HEAD_HALF_W = 28;

  moves.forEach((m, i) => {
    const { shaft, headBase, headTip, dir } = buildArrow(m);
    const px = -dir.y, py = dir.x;

    [m.sr * 8 + m.sc, m.dr * 8 + m.dd].forEach(idx => {
      const sq = board.children[idx];
      sq.style.background = `rgba(${hexToRgb(colors[i])},0.45)`;
      sq.classList.add('click');
      sq.dataset.i = String(i);
    });

    const shaftEl = document.createElementNS(NS, 'path');
    shaftEl.setAttribute('d', shaft);
    shaftEl.setAttribute('stroke', colors[i]);
    shaftEl.setAttribute('stroke-width', String(STROKE));
    shaftEl.setAttribute('stroke-linecap', 'round');
    shaftEl.setAttribute('stroke-linejoin', 'round');
    shaftEl.setAttribute('fill', 'none');
    shaftEl.dataset.i = String(i);
    shaftEl.classList.add('arrow-line');
    svg.appendChild(shaftEl);

    const bx = headBase.x, by = headBase.y;
    const tx = headTip.x, ty = headTip.y;
    const lx = bx + px*HEAD_HALF_W, ly = by + py*HEAD_HALF_W;
    const rx = bx - px*HEAD_HALF_W, ry = by - py*HEAD_HALF_W;
    const head = document.createElementNS(NS, 'path');
    const r = 0.22;
    const lmx = lx+(tx-lx)*r, lmy = ly+(ty-ly)*r;
    const rmx = rx+(tx-rx)*r, rmy = ry+(ty-ry)*r;
    const blx = lx+(rx-lx)*r, bly = ly+(ry-ly)*r;
    const brx = rx+(lx-rx)*r, bry = ry+(ly-ry)*r;
    const tlx = tx+(lx-tx)*r, tly = ty+(ly-ty)*r;
    const trx = tx+(rx-tx)*r, try_ = ty+(ry-ty)*r;
    head.setAttribute('d',
      `M${blx},${bly} Q${lx},${ly} ${lmx},${lmy} L${tlx},${tly} Q${tx},${ty} ${trx},${try_} L${rmx},${rmy} Q${rx},${ry} ${brx},${bry} Z`
    );
    head.setAttribute('fill', colors[i]);
    head.dataset.i = String(i);
    head.classList.add('arrow-line');
    svg.appendChild(head);

    const hit = document.createElementNS(NS, 'path');
    hit.setAttribute('d', shaft);
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '50');
    hit.setAttribute('fill', 'none');
    hit.setAttribute('class', 'arrow-hit');
    hit.dataset.i = String(i);
    svg.appendChild(hit);
  });

  function handleClick(chosen) {
    svg.querySelectorAll('.arrow-line').forEach(l => {
      if (l.dataset.i !== chosen) l.style.animation = 'fadeout 0.25s forwards';
    });
    svg.querySelectorAll('.arrow-hit').forEach(h => {
      if (h.dataset.i !== chosen) h.style.pointerEvents = 'none';
    });
    const u = document.getElementById(undoId);
    u.style.opacity = '1';
    setTimeout(() => { u.style.opacity = '0'; renderBoard(boardId, svgId, undoId, colors); }, 1500);
  }

  svg.onclick = e => {
    const hit = e.target.closest('.arrow-hit');
    if (hit) handleClick(hit.dataset.i);
  };
  board.onclick = e => {
    const sq = e.target.closest('.sq.click');
    if (sq) handleClick(sq.dataset.i);
  };
}

function updateBoards() {
  document.getElementById('label-a').textContent = COLOR2_OPTIONS[pickA].label;
  document.getElementById('tag-a').textContent = COLOR2_OPTIONS[pickA].hex;
  document.getElementById('label-b').textContent = COLOR2_OPTIONS[pickB].label;
  document.getElementById('tag-b').textContent = COLOR2_OPTIONS[pickB].hex;
  renderBoard('board-a', 'svg-a', 'undo-a', getColors(pickA));
  renderBoard('board-b', 'svg-b', 'undo-b', getColors(pickB));
}

// Build color2 selector buttons
const optContainer = document.getElementById('color2-opts');
COLOR2_OPTIONS.forEach((opt, idx) => {
  const btn = document.createElement('button');
  btn.className = 'c2-btn' + (idx <= 1 ? ' on' : '');
  btn.innerHTML = `<div class="c2-dot" style="background:${opt.hex}"></div>${opt.label}`;
  btn.onclick = () => {
    // Toggle: click assigns to A slot, shift-click or second click to B
    if (pickA !== idx && pickB !== idx) {
      pickA = idx;
    } else if (pickA === idx) {
      // already A, do nothing
      return;
    } else if (pickB === idx) {
      return;
    }
    // Swap logic: first unselected click goes to A, second to B
    optContainer.querySelectorAll('.c2-btn').forEach(b => b.classList.remove('on'));
    optContainer.children[pickA].classList.add('on');
    optContainer.children[pickB].classList.add('on');
    updateBoards();
  };
  // Simple: click once = board A, double = board B
  optContainer.appendChild(btn);
});

// Simpler: clicking a non-selected option replaces board A, clicking the A option swaps A↔B
optContainer.innerHTML = '';
COLOR2_OPTIONS.forEach((opt, idx) => {
  const btn = document.createElement('button');
  btn.className = 'c2-btn' + (idx === pickA || idx === pickB ? ' on' : '');
  btn.dataset.idx = idx;
  btn.innerHTML = `<div class="c2-dot" style="background:${opt.hex}"></div>${opt.label}`;
  btn.onclick = () => {
    const i = Number(btn.dataset.idx);
    if (i === pickA || i === pickB) return; // already shown
    pickA = pickB;
    pickB = i;
    optContainer.querySelectorAll('.c2-btn').forEach(b => b.classList.remove('on'));
    optContainer.children[pickA].classList.add('on');
    optContainer.children[pickB].classList.add('on');
    updateBoards();
  };
  optContainer.appendChild(btn);
});

updateBoards();
</script>
</body>
</html>
